name: Refresh Berachain Borrow-Route EARN History

on:
  schedule:
    - cron: '17 */2 * * *'  # Full known-wallet scan, publishes only wallets that need borrow-route verification
  workflow_dispatch:

concurrency:
  group: earn-berachain-borrow-route-history
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      PYTHONUNBUFFERED: '1'
      CHAIN: berachain
      ALCHEMY_BERACHAIN_RPC: ${{ secrets.ALCHEMY_BERACHAIN_RPC }}
      ALCHEMY_BERACHAIN_RPC_2: ${{ secrets.ALCHEMY_BERACHAIN_RPC_2 }}
      ALCHEMY_BERACHAIN_RPC_3: ${{ secrets.ALCHEMY_BERACHAIN_RPC_3 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: python3 -m pip install --upgrade pip requests

      - name: Restore Berachain global runtime cache
        uses: actions/cache@v4
        with:
          path: |
            data/earn-subaccount-history-events
            data/earn-subaccount-history/.progress
            data/earn-subaccount-history/.repair-plans
            data/earn-subaccount-history/.incremental-plans
            data/earn-subaccount-history/berachain
          key: earn-canonical-global-runtime-berachain-${{ github.run_id }}
          restore-keys: |
            earn-canonical-global-runtime-berachain-
            earn-canonical-runtime-berachain-

      - name: Select all known Berachain EARN wallets
        run: |
          set -euo pipefail
          python3 - /tmp/earn-${CHAIN}-all-known-addresses.txt <<'PY'
          import sys
          from pathlib import Path
          from build_earn_subaccount_history import _load_known_addresses

          output = Path(sys.argv[1])
          addresses = _load_known_addresses("berachain")
          if not addresses:
            raise SystemExit("No known Berachain EARN addresses found")
          output.write_text("".join(f"{address}\n" for address in addresses), encoding="utf-8")
          print(f"knownAddressCount={len(addresses)}")
          PY

      - name: Refresh all known canonical history
        id: refresh
        run: |
          set -euo pipefail
          status_path="/tmp/earn-${CHAIN}-global-refresh.json"
          python3 run_earn_canonical_history_refresh.py \
            --chain "$CHAIN" \
            --selection-address-file "/tmp/earn-${CHAIN}-all-known-addresses.txt" \
            --max-scan-workers 8 \
            --max-materialize-workers 8 \
            --max-incremental-scan-workers 10 \
            --max-incremental-apply-workers 10 \
            --max-new-backfill-workers 4 \
            --max-steps 720 \
            --sleep-seconds 20 \
            --allow-empty \
            --skip-unsupported-start-block \
            --allow-checkpoint-incomplete \
            --status-output "$status_path"
          cat "$status_path"
          complete="$(python3 - "$status_path" <<'PY'
          import json
          import sys
          payload = json.load(open(sys.argv[1]))
          print("true" if payload.get("complete") else "false")
          PY
          )"
          skipped="$(python3 - "$status_path" <<'PY'
          import json
          import sys
          payload = json.load(open(sys.argv[1]))
          print("true" if payload.get("skipped") else "false")
          PY
          )"
          echo "complete=${complete}" >> "$GITHUB_OUTPUT"
          echo "skipped=${skipped}" >> "$GITHUB_OUTPUT"
          if [ "$complete" != "true" ]; then
            echo "Global canonical history checkpoint saved; later scheduled runs will continue from cache."
          fi

      - name: Select borrow-route wallets for publication
        if: steps.refresh.outputs.complete == 'true' && steps.refresh.outputs.skipped != 'true'
        run: |
          set -euo pipefail
          python3 select_earn_borrow_route_history_addresses.py \
            --chain "$CHAIN" \
            --output "/tmp/earn-${CHAIN}-borrow-route-addresses.txt" \
            --metadata-output "/tmp/earn-${CHAIN}-borrow-route-addresses.json"
          cat "/tmp/earn-${CHAIN}-borrow-route-addresses.json"

      - name: Build borrow-route verified ledger cache
        if: steps.refresh.outputs.complete == 'true' && steps.refresh.outputs.skipped != 'true'
        run: |
          set -euo pipefail
          if [ ! -s "/tmp/earn-${CHAIN}-borrow-route-addresses.txt" ]; then
            echo "No borrow-route wallets to publish"
            exit 0
          fi
          python3 build_earn_verified_ledger.py \
            --chain "$CHAIN" \
            --address-file "/tmp/earn-${CHAIN}-borrow-route-addresses.txt"

      - name: Save Berachain global runtime cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            data/earn-subaccount-history-events
            data/earn-subaccount-history/.progress
            data/earn-subaccount-history/.repair-plans
            data/earn-subaccount-history/.incremental-plans
            data/earn-subaccount-history/berachain
          key: earn-canonical-global-runtime-berachain-${{ github.run_id }}

      - name: Commit and push borrow-route public history
        if: steps.refresh.outputs.complete == 'true' && steps.refresh.outputs.skipped != 'true'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ ! -s "/tmp/earn-${CHAIN}-borrow-route-addresses.txt" ]; then
            echo "No borrow-route wallets to publish"
            exit 0
          fi
          while IFS= read -r address; do
            [ -n "$address" ] || continue
            history_path="data/earn-subaccount-history/${CHAIN}/${address}.json"
            ledger_path="data/earn-verified-ledger/${CHAIN}/${address}.json"
            [ -f "$history_path" ] && git add -f "$history_path"
            [ -f "$ledger_path" ] && git add -f "$ledger_path"
          done < "/tmp/earn-${CHAIN}-borrow-route-addresses.txt"
          if git diff --staged --quiet; then
            echo "No borrow-route history changes to commit"
            exit 0
          fi
          git commit -m "Refresh Berachain borrow-route EARN history - $(date -u '+%Y-%m-%d %H:%M UTC')"
          for i in 1 2 3; do
            git pull --rebase -X theirs origin master && git push && break
            echo "Push attempt $i failed, retrying..."
            sleep 5
          done
