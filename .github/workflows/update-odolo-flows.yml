name: Update oDOLO Flows

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours at :00
  workflow_dispatch:

concurrency:
  group: odolo-data-push
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests web3

      - name: Restore flows sync state
        uses: actions/cache@v4
        with:
          path: odolo_flows_state.json
          key: odolo-flows-state-${{ github.run_number }}
          restore-keys: |
            odolo-flows-state-

      - name: Generate oDOLO flows
        env:
          PYTHONUNBUFFERED: '1'
          ALCHEMY_BERACHAIN_RPC: ${{ secrets.ALCHEMY_BERACHAIN_RPC }}
          ALCHEMY_BERACHAIN_RPC_2: ${{ secrets.ALCHEMY_BERACHAIN_RPC_2 }}
          ALCHEMY_BERACHAIN_RPC_3: ${{ secrets.ALCHEMY_BERACHAIN_RPC_3 }}
        run: python generate_odolo_flows.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add odolo_flows.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "🔄 Update oDOLO flows data — $(date -u '+%Y-%m-%d %H:%M UTC')"
          # Retry push with rebase up to 3 times to handle concurrent pushes
          for i in 1 2 3; do
            git pull --rebase -X theirs origin master && git push && break
            echo "⚠️ Push attempt $i failed, retrying..."
            sleep 5
          done
