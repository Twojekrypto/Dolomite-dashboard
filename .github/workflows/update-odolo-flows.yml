name: Update oDOLO Flows

on:
  schedule:
    - cron: '30 */6 * * *'  # Every 6 hours
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # Temporarily 6h for first full scan — revert to 120 after cache is populated
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests web3

      - name: Restore flows sync state
        uses: actions/cache@v4
        with:
          path: odolo_flows_state.json
          key: odolo-flows-state-${{ github.run_number }}
          restore-keys: |
            odolo-flows-state-

      - name: Generate oDOLO flows
        env:
          ALCHEMY_BERACHAIN_RPC: ${{ secrets.ALCHEMY_BERACHAIN_RPC }}
          ALCHEMY_BERACHAIN_RPC_2: ${{ secrets.ALCHEMY_BERACHAIN_RPC_2 }}
        run: python generate_odolo_flows.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add odolo_flows.json
          git diff --cached --quiet || git commit -m "chore: update oDOLO flows data"
          git pull --rebase origin master || true
          git push || git push --force-with-lease
