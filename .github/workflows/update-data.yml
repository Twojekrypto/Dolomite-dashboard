name: Update veDOLO Data

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests web3

      - name: Restore locked DOLO cache
        uses: actions/cache@v4
        with:
          path: locked_cache.json
          key: locked-cache-v6-${{ github.run_id }}
          restore-keys: |
            locked-cache-v6-

      - name: Run update script
        run: python update_data.py
        env:
          PYTHONUNBUFFERED: '1'
          BERASCAN_API_KEY: ${{ secrets.BERASCAN_API_KEY }}
          ALCHEMY_BERACHAIN_RPC: ${{ secrets.ALCHEMY_BERACHAIN_RPC }}
          ALCHEMY_BERACHAIN_RPC_2: ${{ secrets.ALCHEMY_BERACHAIN_RPC_2 }}
          ALCHEMY_BERACHAIN_RPC_3: ${{ secrets.ALCHEMY_BERACHAIN_RPC_3 }}

      - name: Fetch DeFi Llama data
        run: python3 fetch_defillama.py

      - name: Fetch Official Dolomite TVL
        run: python3 fetch_dolomite_tvl.py

      - name: Fetch oDOLO contract data
        run: python3 fetch_odolo_contract.py

      - name: Commit & push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add vedolo_holders.json vedolo_holders.csv vedolo_stats.json vedolo_expiry.json dolo_price.json defillama_data.json dolomite_tvl.json odolo_contract_data.json metrics_snapshot.json
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "📊 Auto-update: $(date -u '+%Y-%m-%d %H:%M UTC')"
          # Retry push with rebase up to 3 times to handle concurrent pushes
          for i in 1 2 3; do
            git pull --rebase -X theirs origin master && git push && break
            echo "⚠️ Push attempt $i failed, retrying..."
            sleep 5
          done

