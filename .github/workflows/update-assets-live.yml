name: Update Assets Live Data

on:
  schedule:
    - cron: '7,22,37,52 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build assets snapshot
        run: node scripts/build_assets_live.mjs

      - name: Validate generated data
        run: python3 validate_data.py assets_live.json

      - name: Commit & push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets_live.json
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "Assets live update: $(date -u '+%Y-%m-%d %H:%M UTC')"
          for i in 1 2 3; do
            git pull --rebase -X theirs origin master && git push origin master && break
            echo "Push attempt $i failed, retrying..."
            sleep 5
          done
