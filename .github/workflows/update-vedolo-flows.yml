name: Update veDOLO Flows

on:
  schedule:
    - cron: '27 */6 * * *'  # Every 6 hours, staggered
  workflow_dispatch:

concurrency:
  group: vedolo-flows-push
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Restore veDOLO flows sync state
        uses: actions/cache@v4
        with:
          path: vedolo_flows_state.json
          key: vedolo-flows-state-${{ github.run_number }}
          restore-keys: |
            vedolo-flows-state-

      - name: Generate veDOLO flows
        id: generate
        env:
          PYTHONUNBUFFERED: '1'
          ALCHEMY_BERACHAIN_RPC: ${{ secrets.ALCHEMY_BERACHAIN_RPC }}
          ALCHEMY_BERACHAIN_RPC_2: ${{ secrets.ALCHEMY_BERACHAIN_RPC_2 }}
          ALCHEMY_BERACHAIN_RPC_3: ${{ secrets.ALCHEMY_BERACHAIN_RPC_3 }}
        run: |
          python generate_vedolo_flows.py --max-runtime-seconds 12600
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path

          status_path = Path("vedolo_flows_run_status.json")
          completed = True
          if status_path.exists():
              completed = bool(json.loads(status_path.read_text()).get("completed", True))
          print(f"completed={str(completed).lower()}")
          PY

      - name: Validate generated data
        if: steps.generate.outputs.completed == 'true'
        run: python3 validate_data.py vedolo_flows.json

      - name: Commit and push
        if: steps.generate.outputs.completed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add vedolo_flows.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "🔄 Update veDOLO flows data — $(date -u '+%Y-%m-%d %H:%M UTC')"
          for i in 1 2 3; do
            git pull --rebase -X theirs origin master && git push && break
            echo "⚠️ Push attempt $i failed, retrying..."
            sleep 5
          done
