name: Update DOLO Flows Data

on:
  schedule:
    - cron: '47 */6 * * *'  # Every 6 hours, staggered
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update-flows:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests web3

      - name: Restore holders sync state
        uses: actions/cache@v4
        with:
          path: dolo_holders_state.json
          key: dolo-holders-state-${{ github.run_number }}
          restore-keys: |
            dolo-holders-state-

      - name: Restore flows sync state
        uses: actions/cache@v4
        with:
          path: dolo_flows_state.json
          key: dolo-flows-state-${{ github.run_number }}
          restore-keys: |
            dolo-flows-state-

      - name: Generate DOLO holders data (sync with flows)
        env:
          PYTHONUNBUFFERED: '1'
          ETHERSCAN_API_KEY: ${{ secrets.BERASCAN_API_KEY }}
          BERASCAN_API_KEY: ${{ secrets.BERASCAN_API_KEY }}
          ALCHEMY_BERACHAIN_RPC: ${{ secrets.ALCHEMY_BERACHAIN_RPC }}
          ALCHEMY_BERACHAIN_RPC_2: ${{ secrets.ALCHEMY_BERACHAIN_RPC_2 }}
          ALCHEMY_BERACHAIN_RPC_3: ${{ secrets.ALCHEMY_BERACHAIN_RPC_3 }}
        run: python3 generate_dolo_holders.py

      - name: Generate DOLO flows data
        timeout-minutes: 330
        env:
          PYTHONUNBUFFERED: '1'
          ALCHEMY_BERACHAIN_RPC: ${{ secrets.ALCHEMY_BERACHAIN_RPC }}
          ALCHEMY_BERACHAIN_RPC_2: ${{ secrets.ALCHEMY_BERACHAIN_RPC_2 }}
          ALCHEMY_BERACHAIN_RPC_3: ${{ secrets.ALCHEMY_BERACHAIN_RPC_3 }}
        run: python3 generate_dolo_flows.py

      - name: Save flows state cache (even on timeout)
        if: always()
        uses: actions/cache/save@v4
        with:
          path: dolo_flows_state.json
          key: dolo-flows-state-${{ github.run_number }}

      - name: Save holders state cache (even on timeout)
        if: always()
        uses: actions/cache/save@v4
        with:
          path: dolo_holders_state.json
          key: dolo-holders-state-${{ github.run_number }}

      - name: Validate generated data
        run: python3 validate_data.py dolo_flows.json dolo_holders.json

      - name: Commit and push if changed
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dolo_flows.json dolo_holders.json vesting_investors.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📊 Auto-update DOLO flows + holders $(date -u '+%Y-%m-%d %H:%M UTC')"
            # Retry push with rebase up to 3 times to handle concurrent pushes
            for i in 1 2 3; do
              git pull --rebase -X theirs origin master && git push origin master && break
              echo "⚠️ Push attempt $i failed, retrying..."
              sleep 5
            done
          fi
