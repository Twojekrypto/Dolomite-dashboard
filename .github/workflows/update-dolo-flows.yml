name: Update DOLO Flows Data

on:
  schedule:
    - cron: '15 */6 * * *'  # Every 6 hours at :15
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update-flows:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # Temporarily 6h for first full scan — revert to 120 after cache is populated
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests web3

      - name: Restore holders sync state
        uses: actions/cache@v4
        with:
          path: dolo_holders_state.json
          key: dolo-holders-state-${{ github.run_number }}
          restore-keys: |
            dolo-holders-state-

      - name: Restore flows sync state
        uses: actions/cache@v4
        with:
          path: dolo_flows_state.json
          key: dolo-flows-state-${{ github.run_number }}
          restore-keys: |
            dolo-flows-state-

      - name: Generate DOLO holders data (sync with flows)
        env:
          ETHERSCAN_API_KEY: ${{ secrets.BERASCAN_API_KEY }}
          BERASCAN_API_KEY: ${{ secrets.BERASCAN_API_KEY }}
          ALCHEMY_BERACHAIN_RPC: ${{ secrets.ALCHEMY_BERACHAIN_RPC }}
          ALCHEMY_BERACHAIN_RPC_2: ${{ secrets.ALCHEMY_BERACHAIN_RPC_2 }}
        run: python3 generate_dolo_holders.py

      - name: Generate DOLO flows data
        env:
          ALCHEMY_BERACHAIN_RPC: ${{ secrets.ALCHEMY_BERACHAIN_RPC }}
          ALCHEMY_BERACHAIN_RPC_2: ${{ secrets.ALCHEMY_BERACHAIN_RPC_2 }}
        run: python3 generate_dolo_flows.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dolo_flows.json dolo_holders.json dolo_flows_state.json dolo_holders_state.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📊 Auto-update DOLO flows + holders $(date -u '+%Y-%m-%d %H:%M UTC')"
            git pull --rebase origin master || true
            git push origin master
          fi
