name: Refresh Arbitrum Canonical EARN History

on:
  schedule:
    - cron: '18 */2 * * *'  # Every 2 hours, staggered inside the 3h UI freshness window
  workflow_dispatch:

concurrency:
  group: earn-arbitrum-canonical-history
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      PYTHONUNBUFFERED: '1'
      CHAIN: arbitrum
      HOT_LIMIT: '500'
      ALCHEMY_ARBITRUM_RPC: ${{ secrets.ALCHEMY_ARBITRUM_RPC || secrets.ARBITRUM_RPC_URL || secrets.ARBITRUM_RPC || secrets.ARB_RPC_URL || secrets.ARB_RPC }}
      ALCHEMY_ARBITRUM_RPC_2: ${{ secrets.ALCHEMY_ARBITRUM_RPC_2 || secrets.ARBITRUM_RPC_URL_2 || secrets.ARBITRUM_RPC_2 || secrets.ARB_RPC_URL_2 || secrets.ARB_RPC_2 }}
      ALCHEMY_ARBITRUM_RPC_3: ${{ secrets.ALCHEMY_ARBITRUM_RPC_3 || secrets.ARBITRUM_RPC_URL_3 || secrets.ARBITRUM_RPC_3 || secrets.ARB_RPC_URL_3 || secrets.ARB_RPC_3 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: python3 -m pip install --upgrade pip requests

      - name: Restore Arbitrum canonical runtime cache
        uses: actions/cache@v4
        with:
          path: |
            data/earn-subaccount-history-events
            data/earn-subaccount-history/.progress
            data/earn-subaccount-history/.repair-plans
            data/earn-subaccount-history/.incremental-plans
            data/earn-subaccount-history/arbitrum
          key: earn-canonical-runtime-arbitrum-${{ github.run_id }}
          restore-keys: |
            earn-canonical-runtime-arbitrum-

      - name: Select Arbitrum hot wallets
        run: |
          set -euo pipefail
          python3 select_earn_canonical_hot_addresses.py \
            --chain "$CHAIN" \
            --limit "$HOT_LIMIT" \
            --priority-address-file config/earn_canonical_priority_addresses.txt \
            --priority-address-file config/earn_arbitrum_canonical_hot_addresses.txt \
            --include-priority-even-if-unknown \
            --output "/tmp/earn-${CHAIN}-canonical-hot-addresses.txt" \
            --metadata-output "/tmp/earn-${CHAIN}-canonical-hot-addresses.json"
          cat "/tmp/earn-${CHAIN}-canonical-hot-addresses.json"

      - name: Refresh Arbitrum canonical history incrementally
        run: |
          set -euo pipefail
          python3 run_earn_subaccount_history_incremental.py continue \
            --chain "$CHAIN" \
            --refresh-plan \
            --selection-address-file "/tmp/earn-${CHAIN}-canonical-hot-addresses.txt" \
            --max-scan-workers 12 \
            --max-apply-workers 12 \
            --max-new-backfill-workers 6

          for i in $(seq 1 720); do
            python3 run_earn_subaccount_history_incremental.py continue \
              --chain "$CHAIN" \
              --selection-address-file "/tmp/earn-${CHAIN}-canonical-hot-addresses.txt" \
              --max-scan-workers 12 \
              --max-apply-workers 12 \
              --max-new-backfill-workers 6 \
              --json > /tmp/earn-arbitrum-step.json
            if python3 - <<'PY'
          import json, sys
          from pathlib import Path

          payload = json.load(open('/tmp/earn-arbitrum-step.json'))
          status = payload.get('status') or {}
          coverage = status.get('coverage') or {}
          ratio = float(coverage.get('freshCoverageRatio') or 0)
          selected = int(coverage.get('selectedAddressCount') or 0)
          fresh = int(coverage.get('freshWalletCount') or 0)
          missing = int(coverage.get('missingWalletCount') or 0)
          target_block = int(status.get('targetBlock') or 0)

          print(
              f"Cycle {status.get('cycleId')} | "
              f"target={target_block} | "
              f"scan={status.get('scan', {}).get('completedWorkerCount')}/"
              f"{status.get('scan', {}).get('workerCount')} | "
              f"apply={status.get('apply', {}).get('completedWorkerCount')}/"
              f"{status.get('apply', {}).get('workerCount')} | "
              f"coverage={fresh}/{selected} missing={missing}"
          )

          target = Path('data/earn-subaccount-history/arbitrum/0x28da3dde285d8f1f87b2d858f89961bb8b9af180.json')
          target_fresh = False
          if target.exists() and target_block:
              wallet = json.load(target.open())
              target_fresh = int(wallet.get('lastScannedBlock') or 0) >= target_block

          stages_complete = (
              status.get('scan', {}).get('complete')
              and status.get('newAddressBackfill', {}).get('complete')
              and status.get('apply', {}).get('complete')
          )
          coverage_good = selected > 0 and ratio >= 0.999 and missing <= max(10, int(selected * 0.001))
          sys.exit(0 if stages_complete and coverage_good and target_fresh else 1)
          PY
            then
              break
            fi
            sleep 20
          done

          python3 run_earn_subaccount_history_incremental.py status \
            --chain "$CHAIN" \
            --selection-address-file "/tmp/earn-${CHAIN}-canonical-hot-addresses.txt" \
            --json > /tmp/earn-arbitrum-status.json
          python3 - <<'PY'
          import json
          from pathlib import Path

          status = json.load(open('/tmp/earn-arbitrum-status.json'))
          coverage = status.get('coverage') or {}
          ratio = float(coverage.get('freshCoverageRatio') or 0)
          selected = int(coverage.get('selectedAddressCount') or 0)
          missing = int(coverage.get('missingWalletCount') or 0)
          assert selected > 0, f"No selected addresses in coverage: {coverage}"
          assert ratio >= 0.999, f"Coverage too low: {coverage}"
          assert missing <= max(10, int(selected * 0.001)), f"Too many missing wallets: {coverage}"

          target_block = int(status.get('targetBlock') or 0)
          target = Path('data/earn-subaccount-history/arbitrum/0x28da3dde285d8f1f87b2d858f89961bb8b9af180.json')
          assert target.exists(), f"Expected address history missing: {target}"
          payload = json.load(target.open())
          last_scanned = int(payload.get('lastScannedBlock') or 0)
          assert target_block > 0, f"Invalid target block: {status}"
          assert last_scanned >= target_block, f"Target wallet history stale: {last_scanned} < {target_block}"
          print(
              f"Validated Arbitrum canonical history: "
              f"{coverage.get('freshWalletCount')}/{selected} wallets fresh, "
              f"target wallet at block {last_scanned}"
          )
          PY

      - name: Build Arbitrum verified ledger cache
        run: |
          set -euo pipefail
          python3 build_earn_verified_ledger.py \
            --chain "$CHAIN" \
            --address-file "/tmp/earn-${CHAIN}-canonical-hot-addresses.txt"
        env:
          PYTHONUNBUFFERED: '1'

      - name: Save Arbitrum canonical runtime cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            data/earn-subaccount-history-events
            data/earn-subaccount-history/.progress
            data/earn-subaccount-history/.repair-plans
            data/earn-subaccount-history/.incremental-plans
            data/earn-subaccount-history/arbitrum
          key: earn-canonical-runtime-arbitrum-${{ github.run_id }}

      - name: Run EARN audit checks
        run: python3 run_earn_audit_checks.py

      - name: Commit and push refreshed canonical history
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/earn-subaccount-history/manifest.json data/earn-subaccount-history/arbitrum
          git add -f data/earn-verified-ledger/manifest.json
          if [ -d "data/earn-verified-ledger/${CHAIN}" ]; then
            git add -f "data/earn-verified-ledger/${CHAIN}"
          fi
          if git diff --staged --quiet; then
            echo "No canonical history changes to commit"
            exit 0
          fi
          git commit -m "Refresh Arbitrum canonical EARN history - $(date -u '+%Y-%m-%d %H:%M UTC')"
          for i in 1 2 3; do
            git pull --rebase -X theirs origin master && git push && break
            echo "Push attempt $i failed, retrying..."
            sleep 5
          done
