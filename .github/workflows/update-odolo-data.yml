name: Update oDOLO Data

on:
  schedule:
    - cron: '15 */6 * * *'  # Every 6 hours at :15 (staggered from Flows at :00)
  workflow_dispatch:  # Allow manual trigger

concurrency:
  group: odolo-data-push
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-odolo:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Restore early-exits cache
        uses: actions/cache@v4
        with:
          path: early_exits_cache.json
          key: early-exits-cache-${{ github.run_id }}
          restore-keys: |
            early-exits-cache-

      - name: Restore exercisers cache
        uses: actions/cache@v4
        with:
          path: exercisers_cache.json
          key: exercisers-cache-${{ github.run_id }}
          restore-keys: |
            exercisers-cache-

      - name: Update exercised USD (incremental)
        run: python3 update_exercised_usd.py

      - name: Update average lock data
        run: python3 calculate_avg_lock.py

      - name: Update exercisers by address
        run: python3 generate_exercisers.py
        timeout-minutes: 30
        env:
          PYTHONUNBUFFERED: '1'

      - name: Fetch early exit penalty data
        run: python3 fetch_early_exits.py
        env:
          ALCHEMY_BERACHAIN_RPC: ${{ secrets.ALCHEMY_BERACHAIN_RPC }}
          ALCHEMY_BERACHAIN_RPC_2: ${{ secrets.ALCHEMY_BERACHAIN_RPC_2 }}

      - name: Fetch oDOLO contract data
        run: python3 fetch_odolo_contract.py
        env:
          ALCHEMY_BERACHAIN_RPC: ${{ secrets.ALCHEMY_BERACHAIN_RPC }}
          ALCHEMY_BERACHAIN_RPC_2: ${{ secrets.ALCHEMY_BERACHAIN_RPC_2 }}

      - name: Commit & push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add exercised_usd.json avg_lock_data.json exercisers_by_address.json odolo_contract_data.json early_exits.json
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "📊 oDOLO data update: $(date -u '+%Y-%m-%d %H:%M UTC')"
          # Retry push with rebase up to 3 times to handle concurrent pushes
          for i in 1 2 3; do
            git pull --rebase -X theirs origin master && git push && break
            echo "⚠️ Push attempt $i failed, retrying..."
            sleep 5
          done

