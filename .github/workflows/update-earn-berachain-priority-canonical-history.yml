name: Refresh Berachain Priority EARN History

on:
  schedule:
    - cron: '17 * * * *'  # Hourly priority-pin refresh for user-reported Berachain wallets
  workflow_dispatch:

concurrency:
  group: earn-berachain-priority-canonical-history
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      PYTHONUNBUFFERED: '1'
      CHAIN: berachain
      PRIORITY_ADDRESS_FILE: config/earn_canonical_priority_addresses.txt
      ALCHEMY_BERACHAIN_RPC: ${{ secrets.ALCHEMY_BERACHAIN_RPC }}
      ALCHEMY_BERACHAIN_RPC_2: ${{ secrets.ALCHEMY_BERACHAIN_RPC_2 }}
      ALCHEMY_BERACHAIN_RPC_3: ${{ secrets.ALCHEMY_BERACHAIN_RPC_3 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: python3 -m pip install --upgrade pip requests

      - name: Restore Berachain priority runtime cache
        uses: actions/cache@v4
        with:
          path: |
            data/earn-subaccount-history-events
            data/earn-subaccount-history/.progress
            data/earn-subaccount-history/.repair-plans
            data/earn-subaccount-history/.incremental-plans
            data/earn-subaccount-history/berachain
          key: earn-canonical-priority-runtime-berachain-${{ github.run_id }}
          restore-keys: |
            earn-canonical-priority-runtime-berachain-
            earn-canonical-runtime-berachain-

      - name: Normalize priority address file
        run: |
          set -euo pipefail
          python3 - "$PRIORITY_ADDRESS_FILE" /tmp/earn-${CHAIN}-priority-addresses.txt <<'PY'
          import sys
          src, dst = sys.argv[1], sys.argv[2]
          seen = set()
          out = []
          with open(src, "r", encoding="utf-8") as handle:
            for raw in handle:
              address = raw.split("#", 1)[0].strip().lower()
              if not address:
                continue
              if not address.startswith("0x") or len(address) != 42:
                raise SystemExit(f"Invalid priority address: {raw.strip()}")
              if address in seen:
                continue
              seen.add(address)
              out.append(address)
          if not out:
            raise SystemExit("Priority address file is empty")
          with open(dst, "w", encoding="utf-8") as handle:
            handle.write("\\n".join(out) + "\\n")
          print(f"priorityAddressCount={len(out)}")
          PY

      - name: Refresh priority canonical history
        id: refresh
        run: |
          set -euo pipefail
          status_path="/tmp/earn-${CHAIN}-priority-refresh.json"
          python3 run_earn_canonical_history_refresh.py \
            --chain "$CHAIN" \
            --selection-address-file "/tmp/earn-${CHAIN}-priority-addresses.txt" \
            --max-scan-workers 2 \
            --max-materialize-workers 2 \
            --max-incremental-scan-workers 4 \
            --max-incremental-apply-workers 4 \
            --max-new-backfill-workers 1 \
            --max-steps 90 \
            --sleep-seconds 10 \
            --allow-empty \
            --skip-unsupported-start-block \
            --allow-checkpoint-incomplete \
            --status-output "$status_path"
          cat "$status_path"
          complete="$(python3 - "$status_path" <<'PY'
          import json
          import sys
          payload = json.load(open(sys.argv[1]))
          print("true" if payload.get("complete") else "false")
          PY
          )"
          skipped="$(python3 - "$status_path" <<'PY'
          import json
          import sys
          payload = json.load(open(sys.argv[1]))
          print("true" if payload.get("skipped") else "false")
          PY
          )"
          echo "complete=${complete}" >> "$GITHUB_OUTPUT"
          echo "skipped=${skipped}" >> "$GITHUB_OUTPUT"

      - name: Build priority verified ledger cache
        if: steps.refresh.outputs.complete == 'true' && steps.refresh.outputs.skipped != 'true'
        run: |
          set -euo pipefail
          python3 build_earn_verified_ledger.py \
            --chain "$CHAIN" \
            --address-file "/tmp/earn-${CHAIN}-priority-addresses.txt"

      - name: Save Berachain priority runtime cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            data/earn-subaccount-history-events
            data/earn-subaccount-history/.progress
            data/earn-subaccount-history/.repair-plans
            data/earn-subaccount-history/.incremental-plans
            data/earn-subaccount-history/berachain
          key: earn-canonical-priority-runtime-berachain-${{ github.run_id }}

      - name: Commit and push priority canonical history
        if: steps.refresh.outputs.complete == 'true' && steps.refresh.outputs.skipped != 'true'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/earn-subaccount-history/manifest.json
          git add -f data/earn-verified-ledger/manifest.json
          while IFS= read -r address; do
            [ -n "$address" ] || continue
            history_path="data/earn-subaccount-history/${CHAIN}/${address}.json"
            ledger_path="data/earn-verified-ledger/${CHAIN}/${address}.json"
            [ -f "$history_path" ] && git add -f "$history_path"
            [ -f "$ledger_path" ] && git add -f "$ledger_path"
          done < "/tmp/earn-${CHAIN}-priority-addresses.txt"
          if git diff --staged --quiet; then
            echo "No priority canonical history changes to commit"
            exit 0
          fi
          git commit -m "Refresh Berachain priority EARN history - $(date -u '+%Y-%m-%d %H:%M UTC')"
          for i in 1 2 3; do
            git pull --rebase -X theirs origin master && git push && break
            echo "Push attempt $i failed, retrying..."
            sleep 5
          done
