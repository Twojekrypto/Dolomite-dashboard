name: Update DOLO Holders Data

on:
  schedule:
    # Run every hour
    - cron: '0 * * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update-holders:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests web3

      - name: Restore incremental sync state
        uses: actions/cache@v4
        with:
          path: dolo_holders_state.json
          key: dolo-holders-state-${{ github.run_number }}
          restore-keys: |
            dolo-holders-state-

      - name: Generate DOLO holders data
        env:
          ETHERSCAN_API_KEY: ${{ secrets.BERASCAN_API_KEY }}
          BERASCAN_API_KEY: ${{ secrets.BERASCAN_API_KEY }}
        run: python3 generate_dolo_holders.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dolo_holders.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📊 Auto-update DOLO holders $(date -u '+%Y-%m-%d %H:%M UTC')"
            # Pull latest changes (in case branch moved during long run)
            git pull --rebase origin main || true
            git push origin main
          fi
