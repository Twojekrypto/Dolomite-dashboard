name: Update Earn Netflow Data

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6:00 UTC
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  update-netflow:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Restore netflow progress cache
        uses: actions/cache@v4
        with:
          path: data/.netflow-progress
          key: netflow-progress-${{ github.run_id }}
          restore-keys: |
            netflow-progress-

      - name: Scan earn netflow events
        run: python3 scan_earn_netflow.py

      - name: Commit & push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/earn-netflow/
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "📊 Earn netflow update: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin master
          git push
