name: Update Earn Netflow Data

on:
  schedule:
    - cron: '52 */6 * * *'  # Every 6 hours, after snapshots and token flows
  workflow_dispatch:
    inputs:
      reset_chain:
        description: 'Chain to re-scan from scratch (e.g. arbitrum). Leave empty for normal incremental update.'
        required: false
        default: ''

concurrency:
  group: earn-netflow-data
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-netflow:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Restore netflow progress cache
        if: ${{ github.event.inputs.reset_chain == '' }}
        uses: actions/cache@v4
        with:
          path: data/.netflow-progress
          key: netflow-progress-${{ github.run_id }}
          restore-keys: |
            netflow-progress-

      - name: Reset chain progress (re-scan)
        if: ${{ github.event.inputs.reset_chain != '' }}
        run: |
          CHAIN="${{ github.event.inputs.reset_chain }}"
          echo "Resetting progress for chain: $CHAIN"
          mkdir -p data/.netflow-progress
          echo '{"version": 2, "last_block": 0, "netflows": {}, "cycleAccountState": {}, "cycleMarketState": {}}' > "data/.netflow-progress/${CHAIN}.json"

      - name: Scan earn netflow events
        run: |
          if [ -n "${{ github.event.inputs.reset_chain }}" ]; then
            python3 scan_earn_netflow.py "${{ github.event.inputs.reset_chain }}"
          else
            python3 scan_earn_netflow.py
          fi
        env:
          PYTHONUNBUFFERED: '1'
          ALCHEMY_ARBITRUM_RPC: ${{ secrets.ALCHEMY_ARBITRUM_RPC }}
          ALCHEMY_ARBITRUM_RPC_2: ${{ secrets.ALCHEMY_ARBITRUM_RPC_2 }}
          ALCHEMY_ARBITRUM_RPC_3: ${{ secrets.ALCHEMY_ARBITRUM_RPC_3 }}
          ALCHEMY_ETHEREUM_RPC: ${{ secrets.ALCHEMY_ETHEREUM_RPC }}
          ALCHEMY_ETHEREUM_RPC_2: ${{ secrets.ALCHEMY_ETHEREUM_RPC_2 }}
          ALCHEMY_ETHEREUM_RPC_3: ${{ secrets.ALCHEMY_ETHEREUM_RPC_3 }}
          ALCHEMY_BERACHAIN_RPC: ${{ secrets.ALCHEMY_BERACHAIN_RPC }}
          ALCHEMY_BERACHAIN_RPC_2: ${{ secrets.ALCHEMY_BERACHAIN_RPC_2 }}
          ALCHEMY_BERACHAIN_RPC_3: ${{ secrets.ALCHEMY_BERACHAIN_RPC_3 }}

      - name: Save netflow progress cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/.netflow-progress
          key: netflow-progress-${{ github.run_id }}

      - name: Validate earn netflow data
        run: |
          # Check that earn-netflow directory has valid JSON files
          python3 -c "
          import json, os, sys
          d = 'data/earn-netflow'
          if not os.path.isdir(d):
              print('⚠️ No earn-netflow directory — skipping validation')
              sys.exit(0)
          files = [f for f in os.listdir(d) if f.endswith('.json')]
          if not files:
              print('❌ No JSON files in earn-netflow/')
              sys.exit(1)
          bad = 0
          for f in files:
              try:
                  json.load(open(os.path.join(d, f)))
              except:
                  print(f'❌ Invalid JSON: {f}')
                  bad += 1
          if bad:
              sys.exit(1)
          print(f'✅ All {len(files)} earn-netflow files valid')
          "

      - name: Commit & push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/earn-netflow/
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          # Keep staged earn-netflow changes intact while hiding runner-local cache files.
          git stash push --keep-index --include-untracked --message "netflow-progress" -- data/.netflow-progress || true
          git commit -m "📊 Earn netflow update: $(date -u '+%Y-%m-%d %H:%M UTC')"
          if ! git pull --rebase origin master; then
            echo "⚠️ Rebase conflict — resolving with our data..."
            git rebase --abort
            git pull -X ours origin master
          fi
          git push
          git stash pop || true
