name: Update Earn Netflow Data

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6:00 UTC
  workflow_dispatch:
    inputs:
      reset_chain:
        description: 'Chain to re-scan from scratch (e.g. arbitrum). Leave empty for normal incremental update.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  update-netflow:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Restore netflow progress cache
        if: ${{ github.event.inputs.reset_chain == '' }}
        uses: actions/cache@v4
        with:
          path: data/.netflow-progress
          key: netflow-progress-${{ github.run_id }}
          restore-keys: |
            netflow-progress-

      - name: Reset chain progress (re-scan)
        if: ${{ github.event.inputs.reset_chain != '' }}
        run: |
          CHAIN="${{ github.event.inputs.reset_chain }}"
          echo "Resetting progress for chain: $CHAIN"
          mkdir -p data/.netflow-progress
          echo '{"last_block": 0, "netflows": {}}' > "data/.netflow-progress/${CHAIN}.json"

      - name: Scan earn netflow events
        run: python3 scan_earn_netflow.py
        env:
          ALCHEMY_BERACHAIN_RPC: ${{ secrets.ALCHEMY_BERACHAIN_RPC }}
          ALCHEMY_BERACHAIN_RPC_2: ${{ secrets.ALCHEMY_BERACHAIN_RPC_2 }}

      - name: Save netflow progress cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/.netflow-progress
          key: netflow-progress-${{ github.run_id }}

      - name: Commit & push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/earn-netflow/
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "📊 Earn netflow update: $(date -u '+%Y-%m-%d %H:%M UTC')"
          # Stash any untracked/unstaged files (progress cache etc.) before pull
          git stash --include-untracked || true
          if ! git pull --rebase origin master; then
            echo "⚠️ Rebase conflict — resolving with our data..."
            git rebase --abort
            git pull -X ours origin master
          fi
          git stash pop || true
          git push
