name: Refresh Berachain Canonical EARN History

on:
  schedule:
    - cron: '7 */2 * * *'  # Every 2 hours, staggered before the 3h UI freshness window
  workflow_dispatch:

concurrency:
  group: earn-berachain-canonical-history
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      PYTHONUNBUFFERED: '1'
      CHAIN: berachain
      HOT_LIMIT: '1200'
      ALCHEMY_BERACHAIN_RPC: ${{ secrets.ALCHEMY_BERACHAIN_RPC }}
      ALCHEMY_BERACHAIN_RPC_2: ${{ secrets.ALCHEMY_BERACHAIN_RPC_2 }}
      ALCHEMY_BERACHAIN_RPC_3: ${{ secrets.ALCHEMY_BERACHAIN_RPC_3 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: python3 -m pip install --upgrade pip requests

      - name: Restore Berachain canonical runtime cache
        uses: actions/cache@v4
        with:
          path: |
            data/earn-subaccount-history-events
            data/earn-subaccount-history/.progress
            data/earn-subaccount-history/.repair-plans
            data/earn-subaccount-history/.incremental-plans
            data/earn-subaccount-history/berachain
          key: earn-canonical-runtime-berachain-${{ github.run_id }}
          restore-keys: |
            earn-canonical-runtime-berachain-

      - name: Select Berachain hot wallets
        run: |
          set -euo pipefail
          python3 select_earn_canonical_hot_addresses.py \
            --chain "$CHAIN" \
            --limit "$HOT_LIMIT" \
            --priority-address-file config/earn_canonical_priority_addresses.txt \
            --include-priority-even-if-unknown \
            --output "/tmp/earn-${CHAIN}-canonical-hot-addresses.txt" \
            --metadata-output "/tmp/earn-${CHAIN}-canonical-hot-addresses.json"
          cat "/tmp/earn-${CHAIN}-canonical-hot-addresses.json"

      - name: Refresh Berachain canonical history
        run: |
          set -euo pipefail
          python3 run_earn_canonical_history_refresh.py \
            --chain "$CHAIN" \
            --selection-address-file "/tmp/earn-${CHAIN}-canonical-hot-addresses.txt" \
            --max-scan-workers 8 \
            --max-materialize-workers 8 \
            --max-incremental-scan-workers 10 \
            --max-incremental-apply-workers 10 \
            --max-new-backfill-workers 4 \
            --max-steps 720 \
            --sleep-seconds 20 \
            --allow-empty \
            --skip-unsupported-start-block

      - name: Build Berachain verified ledger cache
        run: |
          set -euo pipefail
          python3 build_earn_verified_ledger.py \
            --chain "$CHAIN" \
            --address-file "/tmp/earn-${CHAIN}-canonical-hot-addresses.txt"
        env:
          PYTHONUNBUFFERED: '1'

      - name: Save Berachain canonical runtime cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            data/earn-subaccount-history-events
            data/earn-subaccount-history/.progress
            data/earn-subaccount-history/.repair-plans
            data/earn-subaccount-history/.incremental-plans
            data/earn-subaccount-history/berachain
          key: earn-canonical-runtime-berachain-${{ github.run_id }}

      - name: Run EARN audit checks
        run: python3 run_earn_audit_checks.py

      - name: Commit and push refreshed canonical history
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/earn-subaccount-history/manifest.json
          if [ -d "data/earn-subaccount-history/${CHAIN}" ]; then
            git add -f "data/earn-subaccount-history/${CHAIN}"
          fi
          git add -f data/earn-verified-ledger/manifest.json
          if [ -d "data/earn-verified-ledger/${CHAIN}" ]; then
            git add -f "data/earn-verified-ledger/${CHAIN}"
          fi
          if git diff --staged --quiet; then
            echo "No canonical history changes to commit"
            exit 0
          fi
          git commit -m "Refresh Berachain canonical EARN history - $(date -u '+%Y-%m-%d %H:%M UTC')"
          for i in 1 2 3; do
            git pull --rebase -X theirs origin master && git push && break
            echo "Push attempt $i failed, retrying..."
            sleep 5
          done
