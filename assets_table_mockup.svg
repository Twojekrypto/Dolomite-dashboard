<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600">
  <!-- ============================================================
       DOLOMITE ASSETS TABLE — FIGMA MOCKUP
       
       Struktura warstw w Figma:
       - Każda KOLUMNA jest osobną grupą (Column-1-Token, Column-2-Chain, itd.)
       - Każdy WIERSZ jest osobną grupą (Row-Header, Row-1-USDC, itd.)
       - Zawartość komórek to osobne grupy (Cell-R1-Token, Cell-R1-Chain, itd.)
       - Przeciągnij kolumnę aby zmienić proporcje
       - Przeciągnij wiersz aby zmienić wysokość
       ============================================================ -->

  <!-- === BACKGROUND === -->
  <g id="Background">
    <rect id="Table-BG" width="1200" height="600" rx="16" fill="#0f172a"/>
    <rect id="Table-Border" x="1" y="1" width="1198" height="598" rx="15" fill="none" stroke="#1e3a5f" stroke-width="1"/>
  </g>

  <!-- === COLUMN BACKGROUNDS (przesuwaj te prostokąty aby zmienić szerokość kolumn) === -->
  <g id="Column-Backgrounds">
    <rect id="ColBG-1-Token-22pct" x="0" y="0" width="264" height="600" fill="transparent" rx="16"/>
    <rect id="ColBG-2-Chain-14pct" x="264" y="0" width="168" height="600" fill="transparent"/>
    <rect id="ColBG-3-Price-14pct" x="432" y="0" width="168" height="600" fill="transparent"/>
    <rect id="ColBG-4-SupplyAPR-25pct" x="600" y="0" width="300" height="600" fill="transparent"/>
    <rect id="ColBG-5-BorrowAPR-25pct" x="900" y="0" width="300" height="600" rx="0 16 16 0" fill="transparent"/>
  </g>

  <!-- === COLUMN WIDTH LABELS (nagłówki z procentami) === -->
  <g id="Column-Width-Labels">
    <g id="Label-Col1">
      <rect x="0" y="0" width="264" height="28" fill="rgba(96,165,250,0.12)" rx="16 0 0 0"/>
      <text x="132" y="18" fill="#60a5fa" font-family="Inter,sans-serif" font-size="10" font-weight="600" text-anchor="middle">TOKEN — 22% (264px)</text>
    </g>
    <g id="Label-Col2">
      <rect x="264" y="0" width="168" height="28" fill="rgba(251,191,36,0.12)"/>
      <text x="348" y="18" fill="#fbbf24" font-family="Inter,sans-serif" font-size="10" font-weight="600" text-anchor="middle">CHAIN — 14% (168px)</text>
    </g>
    <g id="Label-Col3">
      <rect x="432" y="0" width="168" height="28" fill="rgba(251,191,36,0.12)"/>
      <text x="516" y="18" fill="#fbbf24" font-family="Inter,sans-serif" font-size="10" font-weight="600" text-anchor="middle">PRICE — 14% (168px)</text>
    </g>
    <g id="Label-Col4">
      <rect x="600" y="0" width="300" height="28" fill="rgba(52,211,153,0.12)"/>
      <text x="750" y="18" fill="#34d399" font-family="Inter,sans-serif" font-size="10" font-weight="600" text-anchor="middle">SUPPLY APR — 25% (300px)</text>
    </g>
    <g id="Label-Col5">
      <rect x="900" y="0" width="300" height="28" fill="rgba(248,113,113,0.12)" rx="0 16 0 0"/>
      <text x="1050" y="18" fill="#f87171" font-family="Inter,sans-serif" font-size="10" font-weight="600" text-anchor="middle">BORROW APR — 25% (300px)</text>
    </g>
  </g>

  <!-- === COLUMN DIVIDERS (linie rozdzielające kolumny) === -->
  <g id="Column-Dividers">
    <line id="Divider-1-2" x1="264" y1="28" x2="264" y2="600" stroke="rgba(255,255,255,0.06)" stroke-width="1" stroke-dasharray="6,4"/>
    <line id="Divider-2-3" x1="432" y1="28" x2="432" y2="600" stroke="rgba(255,255,255,0.06)" stroke-width="1" stroke-dasharray="6,4"/>
    <line id="Divider-3-4" x1="600" y1="28" x2="600" y2="600" stroke="rgba(255,255,255,0.06)" stroke-width="1" stroke-dasharray="6,4"/>
    <line id="Divider-4-5" x1="900" y1="28" x2="900" y2="600" stroke="rgba(255,255,255,0.06)" stroke-width="1" stroke-dasharray="6,4"/>
  </g>

  <!-- === ROW: HEADER === -->
  <g id="Row-Header">
    <rect id="Header-BG" x="0" y="32" width="1200" height="38" fill="rgba(255,255,255,0.03)"/>
    <line id="Header-Bottom-Line" x1="0" y1="70" x2="1200" y2="70" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

    <g id="Header-Token">
      <text x="52" y="56" fill="rgba(255,255,255,0.4)" font-family="Inter,sans-serif" font-size="10" font-weight="600" letter-spacing="0.8">TOKEN</text>
    </g>
    <g id="Header-Chain">
      <text x="348" y="56" fill="rgba(255,255,255,0.4)" font-family="Inter,sans-serif" font-size="10" font-weight="600" letter-spacing="0.8" text-anchor="middle">CHAIN</text>
    </g>
    <g id="Header-Price">
      <text x="516" y="56" fill="rgba(255,255,255,0.4)" font-family="Inter,sans-serif" font-size="10" font-weight="600" letter-spacing="0.8" text-anchor="middle">PRICE</text>
    </g>
    <g id="Header-SupplyAPR">
      <text x="620" y="56" fill="rgba(255,255,255,0.4)" font-family="Inter,sans-serif" font-size="10" font-weight="600" letter-spacing="0.8">SUPPLY APR ▼</text>
    </g>
    <g id="Header-BorrowAPR">
      <text x="1050" y="56" fill="rgba(255,255,255,0.4)" font-family="Inter,sans-serif" font-size="10" font-weight="600" letter-spacing="0.8" text-anchor="middle">BORROW APR</text>
    </g>
  </g>

  <!-- === ROW 1: USDC === -->
  <g id="Row-1-USDC">
    <rect id="R1-BG" x="0" y="70" width="1200" height="90" fill="transparent"/>
    <line id="R1-Bottom" x1="0" y1="160" x2="1200" y2="160" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

    <g id="Cell-R1-Token">
      <circle id="R1-Icon" cx="40" cy="112" r="18" fill="#2775ca" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
      <text x="40" y="117" fill="#ffffff" font-family="Inter,sans-serif" font-size="12" font-weight="700" text-anchor="middle">$</text>
      <text id="R1-Name" x="68" y="106" fill="#ffffff" font-family="Inter,sans-serif" font-size="14" font-weight="600">USDC</text>
      <text id="R1-Subtitle" x="68" y="122" fill="rgba(255,255,255,0.4)" font-family="Inter,sans-serif" font-size="11">USD Coin</text>
    </g>

    <g id="Cell-R1-Chain">
      <rect id="R1-Chain-Badge" x="322" y="102" width="52" height="22" rx="6" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
      <text x="348" y="117" fill="rgba(255,255,255,0.7)" font-family="Inter,sans-serif" font-size="10" font-weight="500" text-anchor="middle">XLAY</text>
    </g>

    <g id="Cell-R1-Price">
      <text x="516" y="117" fill="rgba(255,255,255,0.85)" font-family="Inter,sans-serif" font-size="13" text-anchor="middle">$1.00</text>
    </g>

    <g id="Cell-R1-SupplyAPR">
      <text id="R1-APR-Main" x="620" y="106" fill="#34d399" font-family="Inter,sans-serif" font-size="16" font-weight="700">85.00%</text>
      <text id="R1-APR-Lending" x="620" y="124" fill="rgba(255,255,255,0.85)" font-family="Inter,sans-serif" font-size="10">+ 85.00% Lending ⓘ</text>
    </g>

    <g id="Cell-R1-BorrowAPR">
      <text x="1050" y="117" fill="#f87171" font-family="Inter,sans-serif" font-size="14" font-weight="600" text-anchor="middle">100.00%</text>
    </g>
  </g>

  <!-- === ROW 2: oriBGT === -->
  <g id="Row-2-oriBGT">
    <rect id="R2-BG" x="0" y="160" width="1200" height="90" fill="rgba(255,255,255,0.015)"/>
    <line id="R2-Bottom" x1="0" y1="250" x2="1200" y2="250" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

    <g id="Cell-R2-Token">
      <circle id="R2-Icon" cx="40" cy="200" r="18" fill="#4f46e5" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
      <text x="40" y="205" fill="#ffffff" font-family="Inter,sans-serif" font-size="9" font-weight="700" text-anchor="middle">ori</text>
      <text id="R2-Name" x="68" y="192" fill="#ffffff" font-family="Inter,sans-serif" font-size="14" font-weight="600">oriBGT</text>
      <text id="R2-Sub1" x="68" y="206" fill="rgba(255,255,255,0.4)" font-family="Inter,sans-serif" font-size="11">Origami iBGT Auto-</text>
      <text id="R2-Sub2" x="68" y="220" fill="rgba(255,255,255,0.4)" font-family="Inter,sans-serif" font-size="11">Compounder</text>
    </g>

    <g id="Cell-R2-Chain">
      <rect id="R2-Chain-Badge" x="322" y="190" width="52" height="22" rx="6" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
      <text x="348" y="205" fill="#fbbf24" font-family="Inter,sans-serif" font-size="10" font-weight="500" text-anchor="middle">BERA</text>
    </g>

    <g id="Cell-R2-Price">
      <text x="516" y="205" fill="rgba(255,255,255,0.85)" font-family="Inter,sans-serif" font-size="13" text-anchor="middle">$1.62</text>
    </g>

    <g id="Cell-R2-SupplyAPR">
      <text id="R2-APR-Main" x="620" y="196" fill="#34d399" font-family="Inter,sans-serif" font-size="16" font-weight="700">40.59%</text>
      <text id="R2-APR-GM" x="620" y="214" fill="#fbbf24" font-family="Inter,sans-serif" font-size="10">+ 40.59% GM Performance ⓘ</text>
    </g>

    <g id="Cell-R2-BorrowAPR">
      <text x="1050" y="205" fill="rgba(255,255,255,0.25)" font-family="Inter,sans-serif" font-size="14" text-anchor="middle">—</text>
    </g>
  </g>

  <!-- === ROW 3: BYUSD (multi-line breakdown) === -->
  <g id="Row-3-BYUSD">
    <rect id="R3-BG" x="0" y="250" width="1200" height="110" fill="transparent"/>
    <line id="R3-Bottom" x1="0" y1="360" x2="1200" y2="360" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

    <g id="Cell-R3-Token">
      <circle id="R3-Icon" cx="40" cy="300" r="18" fill="#00d395" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
      <text x="40" y="305" fill="#ffffff" font-family="Inter,sans-serif" font-size="9" font-weight="700" text-anchor="middle">BY</text>
      <text id="R3-Name" x="68" y="296" fill="#ffffff" font-family="Inter,sans-serif" font-size="14" font-weight="600">BYUSD</text>
      <text id="R3-Subtitle" x="68" y="312" fill="rgba(255,255,255,0.4)" font-family="Inter,sans-serif" font-size="11">BYUSD</text>
    </g>

    <g id="Cell-R3-Chain">
      <rect id="R3-Chain-Badge" x="322" y="290" width="52" height="22" rx="6" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
      <text x="348" y="305" fill="#fbbf24" font-family="Inter,sans-serif" font-size="10" font-weight="500" text-anchor="middle">BERA</text>
    </g>

    <g id="Cell-R3-Price">
      <text x="516" y="305" fill="rgba(255,255,255,0.85)" font-family="Inter,sans-serif" font-size="13" text-anchor="middle">$1.00</text>
    </g>

    <g id="Cell-R3-SupplyAPR">
      <text id="R3-APR-Main" x="620" y="290" fill="#34d399" font-family="Inter,sans-serif" font-size="16" font-weight="700">37.36%</text>
      <text id="R3-APR-Lending" x="620" y="308" fill="rgba(255,255,255,0.85)" font-family="Inter,sans-serif" font-size="10">+ 2.73% Lending ⓘ</text>
      <text id="R3-APR-oDOLO" x="620" y="324" fill="#60a5fa" font-family="Inter,sans-serif" font-size="10">+ 34.64% oDOLO ⓘ</text>
    </g>

    <g id="Cell-R3-BorrowAPR">
      <text x="1050" y="305" fill="#f87171" font-family="Inter,sans-serif" font-size="14" font-weight="600" text-anchor="middle">5.46%</text>
    </g>
  </g>

  <!-- === ROW 4: HONEY (3-line breakdown) === -->
  <g id="Row-4-HONEY">
    <rect id="R4-BG" x="0" y="360" width="1200" height="120" fill="rgba(255,255,255,0.015)"/>
    <line id="R4-Bottom" x1="0" y1="480" x2="1200" y2="480" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

    <g id="Cell-R4-Token">
      <circle id="R4-Icon" cx="40" cy="416" r="18" fill="#ff9900" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
      <text x="40" y="421" fill="#ffffff" font-family="Inter,sans-serif" font-size="12" font-weight="700" text-anchor="middle">H</text>
      <text id="R4-Name" x="68" y="412" fill="#ffffff" font-family="Inter,sans-serif" font-size="14" font-weight="600">HONEY</text>
      <text id="R4-Subtitle" x="68" y="428" fill="rgba(255,255,255,0.4)" font-family="Inter,sans-serif" font-size="11">Honey</text>
    </g>

    <g id="Cell-R4-Chain">
      <rect id="R4-Chain-Badge" x="322" y="406" width="52" height="22" rx="6" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
      <text x="348" y="421" fill="#fbbf24" font-family="Inter,sans-serif" font-size="10" font-weight="500" text-anchor="middle">BERA</text>
    </g>

    <g id="Cell-R4-Price">
      <text x="516" y="421" fill="rgba(255,255,255,0.85)" font-family="Inter,sans-serif" font-size="13" text-anchor="middle">$1.00</text>
    </g>

    <g id="Cell-R4-SupplyAPR">
      <text id="R4-APR-Main" x="620" y="400" fill="#34d399" font-family="Inter,sans-serif" font-size="16" font-weight="700">28.19%</text>
      <text id="R4-APR-Lending" x="620" y="418" fill="rgba(255,255,255,0.85)" font-family="Inter,sans-serif" font-size="10">+ 3.02% Lending ⓘ</text>
      <text id="R4-APR-Vault" x="620" y="434" fill="#fbbf24" font-family="Inter,sans-serif" font-size="10">+ 6.77% iBGT Vault ⓘ</text>
      <text id="R4-APR-oDOLO" x="620" y="450" fill="#60a5fa" font-family="Inter,sans-serif" font-size="10">+ 18.40% oDOLO ⓘ</text>
    </g>

    <g id="Cell-R4-BorrowAPR">
      <text x="1050" y="421" fill="#f87171" font-family="Inter,sans-serif" font-size="14" font-weight="600" text-anchor="middle">5.39%</text>
    </g>
  </g>

  <!-- === INSTRUCTIONS === -->
  <g id="Instructions">
    <rect x="0" y="490" width="1200" height="110" fill="rgba(96,165,250,0.06)" rx="0 0 16 16"/>
    <text x="32" y="516" fill="#60a5fa" font-family="Inter,sans-serif" font-size="13" font-weight="700">📐 Instrukcja Figma</text>
    <text x="32" y="538" fill="rgba(255,255,255,0.6)" font-family="Inter,sans-serif" font-size="11">1. Każda komórka to osobna grupa (np. Cell-R1-Token) — przesuń ją aby zmienić pozycję treści</text>
    <text x="32" y="556" fill="rgba(255,255,255,0.6)" font-family="Inter,sans-serif" font-size="11">2. Kolumny to grupy ColBG-* i Label-* — zmień width prostokąta aby zmienić szerokość kolumny</text>
    <text x="32" y="574" fill="rgba(255,255,255,0.6)" font-family="Inter,sans-serif" font-size="11">3. Wiersze to grupy Row-* — zmień height prostokąta R*-BG aby zmienić wysokość wiersza</text>
    <text x="32" y="592" fill="rgba(255,255,255,0.5)" font-family="Inter,sans-serif" font-size="10" font-style="italic">Wyślij mi screenshot z nowym układem — dostosuję CSS do Twojego designu</text>
  </g>
</svg>
