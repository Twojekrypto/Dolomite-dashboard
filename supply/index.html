<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dolomite · Supply</title>
<link rel="shortcut icon" href="../favicon.ico" type="image/png">
<script>
(async () => {
  try {
    const draftVersion = "supply-draft-20260506-address-headers";
    const response = await fetch(`../liquidation-preview.html?v=${draftVersion}-${Date.now()}`, { cache: "no-store" });
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const html = await response.text();
    const headInject = [
      '<base href="../">',
      '<script>window.__DOLO_ROUTE="supply";window.__DOLO_SUPPLY_REQUIRE_ASSET_SELECTION=false;window.__DOLO_SUPPLY_DEFAULT_ASSET="USD1";<\/script>',
      '<link rel="stylesheet" href="supply/supply-draft.css?v=' + draftVersion + '">',
      '<script defer src="supply/supply-draft.js?v=' + draftVersion + '"><\/script>'
    ].join("");
    document.open();
    document.write(html.replace("<head>", "<head>" + headInject));
    document.close();
  } catch (error) {
    document.body.innerHTML = "<p style=\"font-family:system-ui,sans-serif;padding:24px;color:#f4f3ef;background:#09090b\">Unable to load Supply.</p>";
    console.error("Supply route failed", error);
  }
})();
</script>
</head>
<body></body>
</html>
