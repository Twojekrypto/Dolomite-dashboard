<script>
(async () => {
  try {
    const previewVersion = "ux-consistency-cleanup-20260507";
    const response = await fetch(`dolo-preview.html?v=${previewVersion}`, { cache: "no-cache" });
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const html = await response.text();
    document.open();
    document.write(html.replace("<head>", '<head><base href="./">'));
    document.close();
  } catch (error) {
    document.body.innerHTML = "<p style=\"font-family:system-ui,sans-serif;padding:24px;color:#f4f3ef;background:#09090b\">Unable to load DOLO dashboard.</p>";
    console.error("DOLO home route failed", error);
  }
})();
