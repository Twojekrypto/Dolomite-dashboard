<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dolomite · DOLO</title>
<link rel="icon" href="../dolomite-logo.svg" type="image/svg+xml">
<script>
(async () => {
  try {
    const response = await fetch("../dolo-preview.html", { cache: "no-cache" });
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const html = await response.text();
    document.open();
    document.write(html.replace("<head>", '<head><base href="../">'));
    document.close();
  } catch (error) {
    document.body.innerHTML = "<p style=\"font-family:system-ui,sans-serif;padding:24px;color:#f4f3ef;background:#09090b\">Unable to load DOLO.</p>";
    console.error("DOLO route failed", error);
  }
})();
</script>
</head>
<body></body>
</html>
