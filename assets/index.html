<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dolomite · Assets</title>
<link rel="shortcut icon" href="../favicon.ico" type="image/png">
<script>
(async () => {
  try {
    const previewVersion = "assets-unified-tooltips-20260506";
    const response = await fetch(`../assets-preview.html?v=${previewVersion}`, { cache: "no-cache" });
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const html = await response.text();
    document.open();
    document.write(html.replace("<head>", '<head><base href="../">'));
    document.close();
  } catch (error) {
    document.body.innerHTML = "<p style=\"font-family:system-ui,sans-serif;padding:24px;color:#f4f3ef;background:#09090b\">Unable to load Assets.</p>";
    console.error("Assets route failed", error);
  }
})();
</script>
</head>
<body></body>
</html>
